[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "redactor"
version = "0.1.0"
description = "Local-only PII redaction tool for PDFs, images, and documents"
requires-python = ">=3.10"
dependencies = [
    "PyMuPDF>=1.24.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.scripts]
redactor = "redactor.cli:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/redactor"]

[tool.pytest.ini_options]
testpaths = ["tests"]
